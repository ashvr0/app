name: TheBusLive

options:
  bundleIdPrefix: com.thebuslive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.1"

targets:

  TheBusLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: TheBusLive
        excludes:
          - "**/*.md"
          - "LiveActivity/**"
      - path: TheBusLive/LiveActivity/LiveActivityManager.swift
      - path: TheBusLive/LiveActivity/BusArrivalAttributes.swift

    resources:
      - path: TheBusLive/Assets.xcassets

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app
        PRODUCT_NAME: "TheBus Live"

        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TheBusLive/Info.plist

        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TheBusLive/TheBusLive.entitlements

    dependencies:
      - target: TheBusLiveActivity
        embed: true
        codeSignOnCopy: true


  TheBusLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: TheBusLive/LiveActivity
        excludes:
          - "LiveActivityManager.swift"
          - "Info.plist"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app.activity
        PRODUCT_NAME: TheBusLiveActivity

        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES

        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TheBusLive/LiveActivity/Info.plist

        CODE_SIGN_ENTITLEMENTS: TheBusLive/LiveActivity/TheBusLiveActivity.entitlements