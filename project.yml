name: TheBusLive
options:
  bundleIdPrefix: com.thebuslive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.1"
    # SideStore / ad hoc sideloading builds are typically signed after the
    # fact, so CI produces an unsigned archive by default.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  TheBusLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheBusLive
        excludes:
          - "**/*.md"
    resources:
      - path: TheBusLive/Assets.xcassets
    info:
      path: TheBusLive/Info.plist
      properties:
        CFBundleDisplayName: TheBus Live
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "TheBus Live uses your location to show nearby stops and center the map on your position."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app
        PRODUCT_NAME: TheBus Live
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    capabilities: []