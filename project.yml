name: TheBusLive
options:
  bundleIdPrefix: com.thebuslive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.1"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  TheBusLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheBusLive
        excludes:
          - "**/*.md"
    resources:
      - path: TheBusLive/Assets.xcassets
    info:
      path: TheBusLive/Info.plist
      properties:
        CFBundleDisplayName: TheBus Live
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "TheBus Live uses your location to show nearby stops and center the map on your position."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app
        PRODUCT_NAME: TheBus Live
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: TheBusLiveActivity
        embed: true

  TheBusLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: TheBusLive/LiveActivity
        excludes:
          - "LiveActivityManager.swift"
          - "TrackButton.swift"
    info:
      path: TheBusLive/LiveActivity/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app.activity
        PRODUCT_NAME: TheBusLiveActivity
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.2"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO